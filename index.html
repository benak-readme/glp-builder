${accentRules}

  .bnk-card--primary {
    border-color: color-mix(in srgb, var(--accent) 38%, var(--card-border)) !important;
  }

  .bnk-card__eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    align-self: flex-start;
    font-family: ${F.mono};
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent) !important;
    margin-bottom: 12px;
  }
  .bnk-dot { width: 6px; height: 6px; flex: none; border-radius: 50%; background: var(--accent); }
  .bnk-lock { width: 10px; height: 10px; flex: none; display: inline-block; }

  .bnk-card__title {
    margin: 0 0 6px;
    font-family: ${F.display};
    font-weight: 600;
    font-size: 18px;
    letter-spacing: -0.01em;
  }
  .bnk-card__blurb { font-size: 13px; line-height: 1.5; color: var(--bnk-ink-1) !important; }

  .bnk-card .rm-arrow {
    margin-top: auto;
    padding-top: 14px;
    align-self: flex-end;
    color: var(--accent) !important;
    font-size: 16px;
  }

  .bnk-card:hover { transform: translateY(-2px); }
  .bnk-card:hover {
    background-color: #F4F4F5 !important;
    border-color: color-mix(in srgb, var(--accent) 45%, #D4D4D8) !important;
  }
  [data-color-mode="dark"] .bnk-card:hover {
    background-color: rgba(255, 255, 255, 0.06) !important;
    border-color: color-mix(in srgb, var(--accent) 45%, rgba(255,255,255,0.18)) !important;
  }
  @media (prefers-color-scheme: dark) {
    [data-color-mode="system"] .bnk-card:hover {
      background-color: rgba(255, 255, 255, 0.06) !important;
      border-color: color-mix(in srgb, var(--accent) 45%, rgba(255,255,255,0.18)) !important;
    }
  }
  .bnk-card:hover::before { opacity: 1; }
  .bnk-card:hover .rm-arrow { transform: translateX(4px); }
  .bnk-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
`;
  }

  /* ---------- template-specific card markup ---------- */
  const cardMarkup = cards
    .map((c, i) => {
      const badge = c.badge === "lock" ? LOCK_SVG : '<span class="bnk-dot"></span>';
      const peekItems = c.peekItems.filter((p) => p.trim());
      const peek =
        peekItems.length > 0
          ? `      <span class="bnk-card__peek">
        <span class="bnk-card__peek-label">${esc(c.peekLabel)}</span>
${peekItems
  .map(
    (p) =>
      `        <span class="bnk-card__peek-item">${
        c.peekArrows ? '<span class="bnk-tick">&#8594;</span>' : ""
      }${esc(p)}</span>`
  )
  .join("\n")}
      </span>\n`
          : "";
      const primaryCls = c.primary ? " bnk-card--primary" : "";

      if (T === "audience") {
        return `    <!-- Card ${i + 1} — ${esc(c.title)} -->
    <a class="bnk-card bnk-card--a${i}${primaryCls}" href="${esc(c.href)}"
       ${inlineCardStyle}>
      <span class="bnk-card__eyebrow">${badge}${esc(c.eyebrow)}</span>
      <span class="bnk-card__title" style="color: var(--card-title) !important;">${esc(c.title)}</span>
      <span class="bnk-card__blurb">${esc(c.blurb)}</span>
${peek}      <span class="bnk-card__go bnk-card__go--${c.ctaStyle === "filled" ? "filled" : "ghost"}">${esc(
          c.ctaText
        )}<span class="rm-arrow" aria-hidden="true">&#8594;</span></span>
    </a>`;
      }

      if (T === "solutions") {
        /* Card is a <div>; the CTA is the link (keeps the HTML valid and lets
           screen readers land on a real, labelled link). */
        return `    <!-- Card ${i + 1} — ${esc(c.title)} -->
    <div class="bnk-card bnk-card--a${i}${primaryCls}"
       ${inlineCardStyle}>
      <span class="bnk-card__icon" aria-hidden="true">${esc(c.icon)}</span>
      <span class="bnk-card__title">${esc(c.title)}</span>
      <span class="bnk-card__blurb">${esc(c.blurb)}</span>
${peek}      <a class="bnk-card__go bnk-card__go--${c.ctaStyle === "filled" ? "filled" : "ghost"}" href="${esc(
          c.href
        )}">${esc(c.ctaText)}<span class="rm-arrow" aria-hidden="true">&#8594;</span></a>
    </div>`;
      }

      /* tiles */
      return `    <!-- Tile ${i + 1} — ${esc(c.title)} -->
    <a class="bnk-card bnk-card--a${i}${primaryCls}" href="${esc(c.href)}"
       ${inlineCardStyle}>
      <span class="bnk-card__eyebrow">${badge}${esc(c.eyebrow)}</span>
      <span class="bnk-card__title" style="color: var(--card-title) !important;">${esc(c.title)}</span>
      <span class="bnk-card__blurb">${esc(c.blurb)}</span>
      <span class="rm-arrow" aria-hidden="true">&#8594;</span>
    </a>`;
    })
    .join("\n\n");

  /* ---------- optional markup blocks ---------- */
  const heroEyebrow = cfg.hero.eyebrow.trim()
    ? `    <p class="bnk-hero__eyebrow">${esc(cfg.hero.eyebrow)}</p>\n`
    : "";
  const heroButtons = cfg.hero.buttons
    ? `    <div class="bnk-hero__btns">
      <a class="bnk-btn bnk-btn--primary" href="${esc(cfg.hero.btnPrimary.href)}">${esc(cfg.hero.btnPrimary.label)}</a>
      <a class="bnk-btn bnk-btn--secondary" href="${esc(cfg.hero.btnSecondary.href)}">${esc(cfg.hero.btnSecondary.label)}</a>
    </div>\n`
    : "";
  const sectionMarkup =
    cfg.section.title.trim() || cfg.section.text.trim()
      ? `\n  <div class="bnk-section">
${cfg.section.title.trim() ? `    <h2 class="bnk-section__title">${esc(cfg.section.title)}</h2>\n` : ""}${
          cfg.section.text.trim() ? `    <p class="bnk-section__text">${esc(cfg.section.text)}</p>\n` : ""
        }  </div>\n`
      : "";
  const bannerMarkup = cfg.banner.enabled
    ? `\n  <div class="bnk-banner">
    <div class="bnk-banner__copy">
      <h2 class="bnk-banner__title">${esc(cfg.banner.title)}</h2>
      <p class="bnk-banner__text">${esc(cfg.banner.text)}</p>
    </div>
    <a class="bnk-banner__btn" href="${esc(cfg.banner.btnHref)}">${esc(cfg.banner.btnLabel)}<span class="rm-arrow" aria-hidden="true">&#8594;</span></a>
  </div>\n`
    : "";

  const script = cfg.moveSearch
    ? `
<script>
  /* Theming is handled entirely in CSS above. This script only relocates
     ReadMe's native search + Ask AI controls into the hero row. */
  (function () {
    function placeActions() {
      var actions = document.getElementById("rm-actions");
      if (!actions) return;
      var search = document.querySelector(".rm-Header-search");
      var askai = document.querySelector(".rm-AskAi");
      if (search && search.parentElement !== actions) actions.appendChild(search);
      if (askai && askai.parentElement !== actions) actions.appendChild(askai);
    }
    placeActions();
    if (document.body) {
      new MutationObserver(placeActions).observe(document.body, { childList: true, subtree: true });
    }
  })();
<\/script>`
    : "";

  return `<!--
  Global Landing Page — generated with GLP Builder
  Template: ${TEMPLATES[T].label} · Fonts: ${FONTS[cfg.fonts].label}
  Paste into: dash.readme.io → your group → Global Landing Page

  Theming: ReadMe's NATIVE dark-mode selectors, no JS theming.
    - Light / default : base .bnk-landing variables
    - Explicit dark   : [data-color-mode="dark"] .bnk-landing
    - Same-as-system  : @media (prefers-color-scheme: dark) + [data-color-mode="system"]
-->
<style>
  @import url('${F.importUrl}');
${headerCSS}
  /* ===== GLOBAL THEME MAP — LIGHT / DEFAULT ===== */
  .bnk-landing {
    --bnk-ink-1: #52525B;
    --bnk-ink-2: #71717A;
    --bnk-heading: #18181B;

    /* Card accents (light) */
${lightAccents}

    /* Filled CTA foreground */
    --bnk-cta-on: #FFFFFF;

    --card-bg: #FFFFFF;
    --card-border: #E4E4E7;
    --card-title: #18181B;
    --card-divider: #EEEEF0;
    --card-shadow: 0 1px 2px rgba(0,0,0,.04), 0 10px 30px rgba(0,0,0,.07);
    --card-blur: none;

    box-sizing: border-box;
    max-width: ${L.maxW}px;
    margin: 0 auto;
    padding: 20px 48px 36px;
    background: transparent;
    font-family: ${F.body};
    color: var(--bnk-ink-1);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== DARK MODE — via ReadMe's native data-color-mode signal ===== */
  [data-color-mode="dark"] .bnk-landing {
    --bnk-ink-1: #A1A1AA;
    --bnk-ink-2: #8E8E96;
    --bnk-heading: #ECEFF4;

${darkAccents("      ")}
    --bnk-cta-on: #0B0F14;

    --card-bg: rgba(255, 255, 255, 0.028);
    --card-border: rgba(255, 255, 255, 0.09);
    --card-title: #ECEFF4;
    --card-divider: rgba(255, 255, 255, 0.08);
    --card-shadow: none;
    --card-blur: blur(9px) saturate(118%);
  }
  @media (prefers-color-scheme: dark) {
    [data-color-mode="system"] .bnk-landing {
      --bnk-ink-1: #A1A1AA;
      --bnk-ink-2: #8E8E96;
      --bnk-heading: #ECEFF4;

${darkAccents("        ")}
      --bnk-cta-on: #0B0F14;

      --card-bg: rgba(255, 255, 255, 0.028);
      --card-border: rgba(255, 255, 255, 0.09);
      --card-title: #ECEFF4;
      --card-divider: rgba(255, 255, 255, 0.08);
      --card-shadow: none;
      --card-blur: blur(9px) saturate(118%);
    }
  }

  .bnk-landing *,
  .bnk-landing *::before { box-sizing: border-box; }

  /* ===== Hero ===== */
  .bnk-hero {
    text-align: ${heroLeft ? "left" : "center"};
    margin: 34px ${heroLeft ? "0" : "auto"} 0;
    max-width: ${heroLeft ? "720px" : "640px"};
  }
  .bnk-hero__eyebrow {
    margin: 0 0 14px;
    font-family: ${F.mono};
    font-size: 11.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--bnk-ink-2) !important;
  }
  .bnk-hero__title {
    margin: 0 0 20px;
    font-family: ${F.display};
    font-weight: 600;
    font-size: ${heroLeft ? "42px" : "38px"};
    letter-spacing: -0.01em;
    color: var(--bnk-heading) !important;
  }
  .bnk-hero__sub { margin: 0; font-size: 14.5px; line-height: 1.5; color: var(--bnk-ink-2) !important; }
${heroButtonsCSS}${actionsCSS}${sectionCSS}
  .bnk-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(${L.colMin}px, 1fr));
    gap: ${L.gap}px;${cfg.moveSearch ? "" : "\n    margin-top: 40px;"}
  }
${cardCSS}
  .rm-arrow { display: inline-block; transition: transform 200ms ease; }
${bannerCSS}
  /* ===== Footer ===== */
  .bnk-footer { text-align: center; margin: 34px 0 0; font-size: 13px; color: var(--bnk-ink-2) !important; }
  .bnk-footer a { color: var(--bnk-ink-1) !important; text-decoration: underline; text-underline-offset: 3px; }

  @media (prefers-reduced-motion: reduce) {
    .bnk-card, .bnk-card::before, .bnk-dot, .bnk-card__go, .rm-arrow, .bnk-btn, .bnk-banner__btn { transition: none; }
    .bnk-card:hover { transform: none; }
    .bnk-card:hover .rm-arrow { transform: none; }
  }
</style>

<div class="bnk-landing" id="rm-root">
  <div class="bnk-hero">
${heroEyebrow}    <h1 class="bnk-hero__title">${esc(cfg.hero.title)}</h1>
    <p class="bnk-hero__sub">${esc(cfg.hero.subtitle)}</p>
${heroButtons}  </div>
${cfg.moveSearch ? '\n  <div class="bnk-actions" id="rm-actions"></div>\n' : ""}${sectionMarkup}
  <div class="bnk-grid">
${cardMarkup}
  </div>
${bannerMarkup}${cfg.footer.trim() ? `\n  <p class="bnk-footer">${esc(cfg.footer)}</p>` : ""}
</div>
${script}
`;
}

/* ============================================================

   ============================================================ */
const APP_CSS = `
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

  .glp * { box-sizing: border-box; }
  .glp {
    --bg: #0F1218;
    --panel: #171B23;
    --panel-2: #1D222C;
    --line: rgba(255,255,255,.09);
    --line-2: rgba(255,255,255,.14);
    --ink: #E8EBF1;
    --ink-2: #9BA3B2;
    --ink-3: #6B7385;
    --accent: #4C8DFF;
    --ok: #37C98E;

  .glp-logo__name { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15.5px; letter-spacing: -0.01em; }
  .glp-logo__tag { font-size: 11.5px; color: var(--ink-3); margin-top: 1px; }

  .glp-tabs { display: flex; gap: 4px; margin-left: 10px; background: var(--bg); padding: 4px; border-radius: 9px; border: 1px solid var(--line); }

  .glp-bar__right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  .glp-main { flex: 1; display: flex; min-height: 0; }

  .glp-side {

  .glp-field { margin-bottom: 12px; }

  .glp-input, .glp-textarea, .glp-select {

  /* font picker */
  .glp-font {
    display: flex; align-items: center; gap: 11px;
    width: 100%;
    border: 1px solid var(--line-2); border-radius: 10px;
    background: var(--panel-2); cursor: pointer;
    padding: 9px 12px; margin-bottom: 8px;
    color: var(--ink-2); font-family: inherit; text-align: left;
  }
  .glp-font.on { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); color: var(--ink); }
  .glp-font__aa { font-size: 21px; line-height: 1; color: var(--ink); width: 34px; flex: none; }
  .glp-font__name { font-size: 12.5px; font-weight: 600; display: block; }
  .glp-font__hint { font-size: 10.5px; color: var(--ink-3); display: block; margin-top: 2px; }

  /* sliders */
  .glp-slider { display: flex; align-items: center; gap: 10px; }
  .glp-slider input[type=range] { flex: 1; accent-color: var(--accent); }
  .glp-slider output { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--ink-2); width: 52px; text-align: right; flex: none; }

  /* card accordion */
  .glp-card {
    border: 1px solid var(--line-2);
    border-radius: 10px;
    margin-bottom: 10px;
    background: var(--panel-2);
    overflow: hidden;
  }
  .glp-card__head {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px; cursor: pointer; user-select: none;
  }
  .glp-card__swatch { width: 12px; height: 12px; border-radius: 4px; flex: none; }
  .glp-card__name { font-weight: 600; font-size: 13.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .glp-card__meta { font-size: 11px; color: var(--ink-3); font-family: 'Space Mono', monospace; }
  .glp-iconbtn {
    border: 0; background: transparent; color: var(--ink-3); cursor: pointer;
    font-size: 13px; padding: 3px 6px; border-radius: 5px; line-height: 1;
  }
  .glp-iconbtn:hover { background: var(--line); color: var(--ink); }
  .glp-iconbtn:disabled { opacity: .3; cursor: default; }
  .glp-card__body { padding: 4px 12px 14px; border-top: 1px solid var(--line); }

  .glp-swatches { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
  .glp-swatch {
    width: 26px; height: 26px; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent; padding: 0;
  }
  .glp-swatch.on { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }
  .glp-swatch--custom {
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    font-size: 0;
  }
  .glp-custom-pair { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .glp-custom-pair input[type=color] { width: 34px; height: 26px; border: 1px solid var(--line-2); border-radius: 6px; background: var(--bg); padding: 2px; cursor: pointer; }
  .glp-custom-pair span { font-size: 11px; color: var(--ink-3); }

  .glp-seg { display: inline-flex; background: var(--bg); border: 1px solid var(--line-2); border-radius: 8px; padding: 3px; gap: 2px; }
  .glp-seg button {
    border: 0; background: transparent; color: var(--ink-2);
    font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: inherit;
  }
  .glp-seg button.on { background: var(--panel-2); color: var(--ink); box-shadow: 0 0 0 1px var(--line-2); }

  .glp-peekitem { display: flex; gap: 6px; margin-bottom: 6px; }
  .glp-peekitem .glp-input { flex: 1; }

  .glp-add {
    width: 100%; border: 1px dashed var(--line-2); background: transparent;
    color: var(--ink-2); border-radius: 10px; padding: 11px; cursor: pointer;
    font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: .04em;
  }
  .glp-add:hover { border-color: var(--accent); color: var(--accent); }
  .glp-add:disabled { opacity: .4; cursor: default; }
  .glp-add--sm { padding: 7px; font-size: 11px; border-radius: 8px; }

  /* preview */
  .glp-view { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .glp-view__bar {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 16px; flex: none;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .glp-view__label { font-family: 'Space Mono', monospace; font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); }
  .glp-view__framewrap {
    flex: 1; min-height: 0; display: flex; justify-content: center;
    padding: 16px;
    background:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,.055) 1px, transparent 0) 0 0 / 22px 22px,
      var(--bg);
  }
  .glp-frame {
    border: 1px solid var(--line-2);
    border-radius: 12px;
    background: #fff;
    width: 100%; height: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.45);
    transition: max-width 250ms ease;
  }
  .glp-frame.mobile { max-width: 396px; }

  /* code tab */
  .glp-code {
    width: 46%; min-width: 380px; flex: none;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--line);
    background: var(--panel);
  }
  .glp-code__bar {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; flex: none; border-bottom: 1px solid var(--line);
  }
  .glp-code__bar .glp-view__label { margin-right: auto; }
  .glp-code textarea {
    flex: 1; width: 100%; border: 0; resize: none;
    background: #0B0E13; color: #D6DEEA;
    font-family: 'Space Mono', ui-monospace, monospace;
    font-size: 12px; line-height: 1.6;
    padding: 16px; outline: none;
    tab-size: 2; white-space: pre; overflow: auto;
  }
  .glp-chip {
    font-size: 11px; font-family: 'Space Mono', monospace;
    padding: 3px 9px; border-radius: 20px;
    border: 1px solid var(--line-2); color: var(--ink-2);
  }
  .glp-chip--warn { border-color: rgba(227,177,104,.5); color: #E3B168; }
  .glp-smallbtn {
    border: 1px solid var(--line-2); background: transparent; color: var(--ink-2);
    font-size: 11.5px; padding: 5px 11px; border-radius: 7px; cursor: pointer; font-family: inherit;
  }
  .glp-smallbtn:hover { color: var(--ink); border-color: var(--ink-3); }

  .glp-banner {
    display: flex; align-items: center; gap: 10px;
    background: rgba(227,177,104,.09);
    border-bottom: 1px solid rgba(227,177,104,.25);
    color: #E9C78D; font-size: 12px;
    padding: 8px 14px;
  }
  .glp-banner button { margin-left: auto; }

  @media (max-width: 900px) {
    .glp-main { flex-direction: column; overflow-y: auto; }
    .glp-side, .glp-code { width: 100%; border-right: 0; border-bottom: 1px solid var(--line); max-height: 50vh; }
    .glp-view { min-height: 60vh; }
    .glp-hint { display: none; }
  }
`;

/* ---------- small reusable inputs ---------- */
function Field({ label, children }) {
  return (
    <div className="glp-field">
      <label>{label}</label>
      {children}
    </div>
  );
}

function Seg({ value, options, onChange }) {
  return (
    <div className="glp-seg">
      {options.map((o) => (
        <button key={o.value} className={value === o.value ? "on" : ""} onClick={() => onChange(o.value)} type="button">
          {o.label}
        </button>
      ))}
    </div>
  );
}

function Slider({ label, value, min, max, step = 1, unit = "px", onChange }) {
  return (
    <Field label={label}>
      <div className="glp-slider">
        <input type="range" min={min} max={max} step={step} value={value} onChange={(e) => onChange(Number(e.target.value))} />
        <output>
          {value}
          {unit}
        </output>
      </div>
    </Field>
  );
}

/* ---------- template picker ---------- */
function TemplatePicker({ value, onChange }) {
  return (
    <div className="glp-tpl">
      <button type="button" className={"glp-tpl__opt" + (value === "audience" ? " on" : "")} onClick={() => onChange("audience")}>
        <span className="glp-tpl__thumb thumb-audience"><i /><i /><i /></span>
        <span className="glp-tpl__name">Audience Split</span>
        <span className="glp-tpl__hint">Tall gated/open cards with previews</span>
      </button>
      <button type="button" className={"glp-tpl__opt" + (value === "solutions" ? " on" : "")} onClick={() => onChange("solutions")}>
        <span className="glp-tpl__thumb thumb-solutions">
          <i className="t-hero" />
          <span className="t-row"><i /><i /><i /><i /></span>
        </span>
        <span className="glp-tpl__name">Solutions Grid</span>
        <span className="glp-tpl__hint">dLocal-style hero, icons &amp; banner</span>
      </button>
      <button type="button" className={"glp-tpl__opt" + (value === "tiles" ? " on" : "")} onClick={() => onChange("tiles")}>
        <span className="glp-tpl__thumb thumb-tiles"><i /><i /><i /><i /><i /><i /></span>
        <span className="glp-tpl__name">Quick Links</span>
        <span className="glp-tpl__hint">Compact tiles for many projects</span>
      </button>
    </div>
  );
}

/* ---------- card editor ---------- */
function CardEditor({ card, index, count, template, open, onToggle, onChange, onMove, onRemove }) {
  const acc = cardAccent(card);
  const set = (patch) => onChange({ ...card, ...patch });
  const setPeek = (i, val) => {
    const items = [...card.peekItems];
    items[i] = val;
    set({ peekItems: items });
  };
  const isTiles = template === "tiles";
  const isSolutions = template === "solutions";
  return (
    <div className="glp-card">
      <div className="glp-card__head" onClick={onToggle}>
        <span className="glp-card__swatch" style={{ background: acc.light }} />
        <span className="glp-card__name">{card.title || "Untitled card"}</span>
        <span className="glp-card__meta">{card.href}</span>
        <button className="glp-iconbtn" title="Move up" disabled={index === 0}
          onClick={(e) => { e.stopPropagation(); onMove(-1); }} type="button">&#8593;</button>
        <button className="glp-iconbtn" title="Move down" disabled={index === count - 1}
          onClick={(e) => { e.stopPropagation(); onMove(1); }} type="button">&#8595;</button>
        <button className="glp-iconbtn" title="Delete card" disabled={count === 1}
          onClick={(e) => { e.stopPropagation(); onRemove(); }} type="button">&#10005;</button>
        <span className="glp-iconbtn" style={{ transform: open ? "rotate(90deg)" : "none", transition: "transform 150ms" }}>&#8250;</span>
      </div>
      {open && (
        <div className="glp-card__body">
          <div className="glp-row2">
            <Field label="Card title">
              <input className="glp-input" value={card.title} onChange={(e) => set({ title: e.target.value })} />
            </Field>
            <Field label="Links to (path)">
              <input className="glp-input" value={card.href} onChange={(e) => set({ href: e.target.value })} placeholder="/my-project" />
            </Field>
          </div>
          <Field label="Description">
            <textarea className="glp-textarea" value={card.blurb} onChange={(e) => set({ blurb: e.target.value })} />
          </Field>

          {isSolutions ? (
            <Field label="Icon (emoji or 1–2 characters)">
              <input className="glp-input" style={{ width: 90 }} value={card.icon} onChange={(e) => set({ icon: e.target.value })} />
            </Field>
          ) : (
            <div className="glp-row2">
              <Field label="Badge text">
                <input className="glp-input" value={card.eyebrow} onChange={(e) => set({ eyebrow: e.target.value })} />
              </Field>
              <Field label="Badge icon">
                <Seg
                  value={card.badge}
                  onChange={(v) => set({ badge: v })}
                  options={[
                    { value: "dot", label: "● Open" },
                    { value: "lock", label: "🔒 Locked" },
                  ]}
                />
              </Field>
            </div>
          )}

          <Field label="Accent color">
            <div className="glp-swatches">
              {Object.entries(ACCENTS).map(([key, a]) => (
                <button
                  key={key}
                  type="button"
                  title={a.label}
                  className={"glp-swatch" + (card.accent === key ? " on" : "")}
                  style={{ background: `linear-gradient(135deg, ${a.light} 50%, ${a.dark} 50%)` }}
                  onClick={() => set({ accent: key })}
                />
              ))}
              <button
                type="button"
                title="Custom"
                className={"glp-swatch glp-swatch--custom" + (card.accent === "custom" ? " on" : "")}
                onClick={() => set({ accent: "custom" })}
              >
                custom
              </button>
            </div>
            {card.accent === "custom" && (
              <div className="glp-custom-pair">
                <input type="color" value={card.customLight} onChange={(e) => set({ customLight: e.target.value })} />
                <span>light mode</span>
                <input type="color" value={card.customDark} onChange={(e) => set({ customDark: e.target.value })} />
                <span>dark mode (use a brighter shade)</span>
              </div>
            )}
          </Field>

          {!isTiles && (
            <div className="glp-row2">
              <Field label="Button text">
                <input className="glp-input" value={card.ctaText} onChange={(e) => set({ ctaText: e.target.value })} />
              </Field>
              <Field label="Button style">
                <Seg
                  value={card.ctaStyle}
                  onChange={(v) => set({ ctaStyle: v })}
                  options={[
                    { value: "filled", label: "Filled" },
                    { value: "ghost", label: "Outlined" },
                  ]}
                />
              </Field>
            </div>
          )}

          <label className="glp-toggle">
            <input type="checkbox" checked={card.primary} onChange={(e) => set({ primary: e.target.checked })} />
            <span className="glp-toggle__text">
              <b>Highlight as the primary card</b>
              <span>Adds an accent-tinted border so this card reads as the main path.</span>
            </span>
          </label>

          {!isTiles && (
            <>
              <Field label="List heading (e.g. Popular, Inside)">
                <input className="glp-input" value={card.peekLabel} onChange={(e) => set({ peekLabel: e.target.value })} />
              </Field>
              <Field label="List items (leave blank to hide)">
                {card.peekItems.map((p, i) => (
                  <div className="glp-peekitem" key={i}>
                    <input className="glp-input" value={p} onChange={(e) => setPeek(i, e.target.value)} />
                    <button
                      className="glp-iconbtn"
                      type="button"
                      title="Remove item"
                      onClick={() => set({ peekItems: card.peekItems.filter((_, j) => j !== i) })}
                    >
                      &#10005;
                    </button>
                  </div>
                ))}
                {card.peekItems.length < 5 && (
                  <button className="glp-add glp-add--sm" type="button" onClick={() => set({ peekItems: [...card.peekItems, ""] })}>
                    + Add list item
                  </button>
                )}
              </Field>
              <label className="glp-toggle" style={{ paddingTop: 0 }}>
                <input type="checkbox" checked={card.peekArrows} onChange={(e) => set({ peekArrows: e.target.checked })} />
                <span className="glp-toggle__text">
                  <b>Arrow bullets</b>
                  <span>Show a small → in the accent color before each list item.</span>
                </span>
              </label>
            </>
          )}
        </div>
      )}
    </div>
  );
}

/* ---------- preview pane ---------- */
function Preview({ html, mode, setMode, device, setDevice }) {
  const [doc, setDoc] = useState(() => buildPreviewDoc(html, mode));
  useEffect(() => {
    const t = setTimeout(() => setDoc(buildPreviewDoc(html, mode)), 250);
    return () => clearTimeout(t);
  }, [html, mode]);
  return (
    <div className="glp-view">
      <div className="glp-view__bar">
        <span className="glp-view__label">Live preview</span>
        <Seg
          value={mode}
          onChange={setMode}
          options={[
            { value: "light", label: "☀ Light" },
            { value: "dark", label: "☾ Dark" },
          ]}
        />
        <Seg
          value={device}
          onChange={setDevice}
          options={[
            { value: "desktop", label: "Desktop" },
            { value: "mobile", label: "Mobile" },
          ]}
        />
        <span style={{ marginLeft: "auto", fontSize: 11.5, color: "var(--ink-3)" }}>
          Header, search &amp; Ask AI are stand-ins for ReadMe's real hub chrome
        </span>
      </div>
      <div className="glp-view__framewrap">
        <iframe
          className={"glp-frame" + (device === "mobile" ? " mobile" : "")}
          title="Landing page preview"
          sandbox="allow-scripts allow-same-origin"
          srcDoc={doc}
        />
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [tab, setTab] = useState("build");
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  const [override, setOverride] = useState(null);
  const [openCard, setOpenCard] = useState(DEFAULT_CONFIG.cards[0].id);
  const [mode, setMode] = useState("light");
  const [device, setDevice] = useState("desktop");
  const [copied, setCopied] = useState(false);

  const generated = useMemo(() => generateHTML(config), [config]);
  const exportHtml = override ?? generated;

  const patch = (p) => setConfig((c) => ({ ...c, ...p }));
  const setHero = (p) => setConfig((c) => ({ ...c, hero: { ...c.hero, ...p } }));
  const setLayout = (p) => setConfig((c) => ({ ...c, layout: { ...c.layout, ...p } }));
  const setBanner = (p) => setConfig((c) => ({ ...c, banner: { ...c.banner, ...p } }));
  const setSection = (p) => setConfig((c) => ({ ...c, section: { ...c.section, ...p } }));

  const setTemplate = (t) =>
    setConfig((c) => {
      /* sensible layout defaults per template, without touching content */
      const layout =
        t === "tiles"
          ? { ...c.layout, colMin: 220, autoH: true }
          : t === "solutions"
          ? { ...c.layout, colMin: 240, autoH: true }
          : { ...c.layout, colMin: 258, autoH: false };
      return { ...c, template: t, layout };
    });

  const setCard = (id, next) => setConfig((c) => ({ ...c, cards: c.cards.map((k) => (k.id === id ? next : k)) }));
  const moveCard = (id, dir) =>
    setConfig((c) => {
      const i = c.cards.findIndex((k) => k.id === id);
      const j = i + dir;
      if (j < 0 || j >= c.cards.length) return c;
      const cards = [...c.cards];
      [cards[i], cards[j]] = [cards[j], cards[i]];
      return { ...c, cards };
    });
  const removeCard = (id) => setConfig((c) => (c.cards.length > 1 ? { ...c, cards: c.cards.filter((k) => k.id !== id) } : c));
  const addCard = () =>
    setConfig((c) => {
      if (c.cards.length >= 6) return c;
      const id = uid();
      setOpenCard(id);
      return {
        ...c,
        cards: [
          ...c.cards,
          {
            id,
            icon: "🚀",
            title: "New audience",
            blurb: "Describe who this documentation is for.",
            href: "/project-slug",
            eyebrow: "Open access",
            badge: "dot",
            accent: "blue",
            customLight: "#0B63C5",
            customDark: "#6FB4F5",
            peekLabel: "Inside",
            peekItems: ["First highlight", "Second highlight"],
            peekArrows: false,
            ctaText: "View docs",
            ctaStyle: "ghost",
            primary: false,
          },
        ],
      };
    });

  const copy = useCallback(async () => {
    let ok = false;
    try {
      await navigator.clipboard.writeText(exportHtml);
      ok = true;
    } catch (e) {
      try {
        const ta = document.createElement("textarea");
        ta.value = exportHtml;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        ok = document.execCommand("copy");
        document.body.removeChild(ta);
      } catch (e2) {
        ok = false;
      }
    }
    if (ok) {
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    }
  }, [exportHtml]);

  const download = useCallback(() => {
    const blob = new Blob([exportHtml], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "global-landing-page.html";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 500);
  }, [exportHtml]);

  const isTiles = config.template === "tiles";
  const isSolutions = config.template === "solutions";

  return (
    <div className="glp">
      <style>{APP_CSS}</style>

      <div className="glp-bar">
        <div className="glp-logo">
          <div className="glp-logo__mark">GL</div>
          <div>
            <div className="glp-logo__name">GLP Builder</div>
            <div className="glp-logo__tag">Global landing pages for ReadMe Enterprise</div>
          </div>
        </div>
        <div className="glp-tabs">
          <button className={"glp-tab" + (tab === "build" ? " on" : "")} onClick={() => setTab("build")} type="button">
            BUILD
          </button>
          <button className={"glp-tab" + (tab === "code" ? " on" : "")} onClick={() => setTab("code")} type="button">
            CODE
          </button>
        </div>
        <div className="glp-bar__right">
          <span className="glp-hint">Paste the copied HTML into dash.readme.io → your group → Global Landing Page</span>
          <button className="glp-smallbtn" onClick={download} type="button" style={{ padding: "8px 13px" }}>
            Download .html
          </button>
          <button className={"glp-copy" + (copied ? " done" : "")} onClick={copy} type="button">
            {copied ? "✓ Copied" : "Copy HTML"}
          </button>
        </div>
      </div>

      <div className="glp-main">
        {tab === "build" ? (
          <>
            <div className="glp-side">
              {override !== null && (
                <div className="glp-banner" style={{ borderRadius: 10, border: "1px solid rgba(227,177,104,.3)", marginBottom: 16 }}>
                  <span>Manual code edits are active — "Copy HTML" exports your edited code, not these settings.</span>
                  <button className="glp-smallbtn" type="button" onClick={() => setOverride(null)}>
                    Discard edits
                  </button>
                </div>
              )}

              <div className="glp-sec">
                <p className="glp-sec__label">Template</p>
                <TemplatePicker value={config.template} onChange={setTemplate} />
              </div>

              <div className="glp-sec">
                <p className="glp-sec__label">Typography</p>
                {Object.entries(FONTS).map(([key, f]) => (
                  <button
                    key={key}
                    type="button"
                    className={"glp-font" + (config.fonts === key ? " on" : "")}
                    onClick={() => patch({ fonts: key })}
                  >
                    <span className="glp-font__aa" style={{ fontFamily: f.display }}>
                      Aa
                    </span>
                    <span>
                      <span className="glp-font__name">{f.label}</span>
                      <span className="glp-font__hint">{f.hint}</span>
                    </span>
                  </button>
                ))}
              </div>

              <div className="glp-sec">
                <p className="glp-sec__label">Hero</p>
                <Field label="Eyebrow (small caps line above the title — leave blank to hide)">
                  <input
                    className="glp-input"
                    value={config.hero.eyebrow}
                    onChange={(e) => setHero({ eyebrow: e.target.value })}
                    placeholder="e.g. Documentation center"
                  />
                </Field>
                <Field label="Page title">
                  <input className="glp-input" value={config.hero.title} onChange={(e) => setHero({ title: e.target.value })} />
                </Field>
                <Field label="Subtitle">
                  <textarea className="glp-textarea" value={config.hero.subtitle} onChange={(e) => setHero({ subtitle: e.target.value })} />
                </Field>
                <Field label="Alignment">
                  <Seg
                    value={config.hero.align}
                    onChange={(v) => setHero({ align: v })}
                    options={[
                      { value: "center", label: "Centered" },
                      { value: "left", label: "Left" },
                    ]}
                  />
                </Field>
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.hero.buttons} onChange={(e) => setHero({ buttons: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Hero buttons</b>
                    <span>Primary + secondary call-to-action under the subtitle (dLocal style).</span>
                  </span>
                </label>
                {config.hero.buttons && (
                  <>
                    <div className="glp-row2">
                      <Field label="Primary label">
                        <input
                          className="glp-input"
                          value={config.hero.btnPrimary.label}
                          onChange={(e) => setHero({ btnPrimary: { ...config.hero.btnPrimary, label: e.target.value } })}
                        />
                      </Field>
                      <Field label="Primary link">
                        <input
                          className="glp-input"
                          value={config.hero.btnPrimary.href}
                          onChange={(e) => setHero({ btnPrimary: { ...config.hero.btnPrimary, href: e.target.value } })}
                        />
                      </Field>
                    </div>
                    <div className="glp-row2">
                      <Field label="Secondary label">
                        <input
                          className="glp-input"
                          value={config.hero.btnSecondary.label}
                          onChange={(e) => setHero({ btnSecondary: { ...config.hero.btnSecondary, label: e.target.value } })}
                        />
                      </Field>
                      <Field label="Secondary link">
                        <input
                          className="glp-input"
                          value={config.hero.btnSecondary.href}
                          onChange={(e) => setHero({ btnSecondary: { ...config.hero.btnSecondary, href: e.target.value } })}
                        />
                      </Field>
                    </div>
                  </>
                )}
              </div>

              <div className="glp-sec">
                <p className="glp-sec__label">Hub chrome</p>
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.moveSearch} onChange={(e) => patch({ moveSearch: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Center search &amp; Ask AI under the title</b>
                    <span>Moves ReadMe's native search bar and Ask AI button out of the header into a hero row.</span>
                  </span>
                </label>
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.flattenHeader} onChange={(e) => patch({ flattenHeader: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Transparent single-row header</b>
                    <span>Removes the header background and second nav row on this page only.</span>
                  </span>
                </label>
              </div>

              <div className="glp-sec">
                <p className="glp-sec__label">Section heading</p>
                <Field label="Heading above the cards (leave blank to hide)">
                  <input
                    className="glp-input"
                    value={config.section.title}
                    onChange={(e) => setSection({ title: e.target.value })}
                    placeholder="e.g. Get to know our solutions"
                  />
                </Field>
                <Field label="Intro text">
                  <textarea className="glp-textarea" value={config.section.text} onChange={(e) => setSection({ text: e.target.value })} />
                </Field>
              </div>

              <div className="glp-sec">
                <p className="glp-sec__label">Cards · {config.cards.length}/6</p>
                {config.cards.map((card, i) => (
                  <CardEditor
                    key={card.id}
                    card={card}
                    index={i}
                    count={config.cards.length}
                    template={config.template}
                    open={openCard === card.id}
                    onToggle={() => setOpenCard(openCard === card.id ? null : card.id)}
                    onChange={(next) => setCard(card.id, next)}
                    onMove={(dir) => moveCard(card.id, dir)}
                    onRemove={() => removeCard(card.id)}
                  />
                ))}
                <button className="glp-add" type="button" onClick={addCard} disabled={config.cards.length >= 6}>
                  + Add card
                </button>
              </div>

              <div className="glp-sec">
                <p className="glp-sec__label">Layout</p>
                <Field label="Page width">
                  <Seg
                    value={config.layout.maxW}
                    onChange={(v) => setLayout({ maxW: v })}
                    options={[
                      { value: 960, label: "Narrow" },
                      { value: 1120, label: "Default" },
                      { value: 1280, label: "Wide" },
                    ]}
                  />
                </Field>
                <Slider label="Minimum column width (controls how many cards fit per row)" value={config.layout.colMin} min={180} max={360} onChange={(v) => setLayout({ colMin: v })} />
                <Slider label="Gap between cards" value={config.layout.gap} min={12} max={36} onChange={(v) => setLayout({ gap: v })} />
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.layout.autoH} onChange={(e) => setLayout({ autoH: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Auto card height</b>
                    <span>Let content decide the height instead of a fixed minimum.</span>
                  </span>
                </label>
                {!config.layout.autoH && (
                  <Slider label="Card minimum height" value={config.layout.cardMinH} min={160} max={520} step={4} onChange={(v) => setLayout({ cardMinH: v })} />
                )}
              </div>

              <div className="glp-sec">
                <p className="glp-sec__label">Contact banner</p>
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.banner.enabled} onChange={(e) => setBanner({ enabled: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Show a banner below the cards</b>
                    <span>Full-width call-to-action, like dLocal's "Need help building your solution?"</span>
                  </span>
                </label>
                {config.banner.enabled && (
                  <>
                    <Field label="Banner title">
                      <input className="glp-input" value={config.banner.title} onChange={(e) => setBanner({ title: e.target.value })} />
                    </Field>
                    <Field label="Banner text">
                      <textarea className="glp-textarea" value={config.banner.text} onChange={(e) => setBanner({ text: e.target.value })} />
                    </Field>
                    <div className="glp-row2">
                      <Field label="Button label">
                        <input className="glp-input" value={config.banner.btnLabel} onChange={(e) => setBanner({ btnLabel: e.target.value })} />
                      </Field>
                      <Field label="Button link">
                        <input className="glp-input" value={config.banner.btnHref} onChange={(e) => setBanner({ btnHref: e.target.value })} />
                      </Field>
                    </div>
                  </>
                )}
              </div>

              <div className="glp-sec">
                <p className="glp-sec__label">Footer</p>
                <Field label="Footer line (leave blank to hide)">
                  <input className="glp-input" value={config.footer} onChange={(e) => patch({ footer: e.target.value })} />
                </Field>
              </div>
            </div>
            <Preview html={generated} mode={mode} setMode={setMode} device={device} setDevice={setDevice} />
          </>
        ) : (
          <>
            <div className="glp-code">
              {override !== null && (
                <div className="glp-banner">
                  <span>Edited by hand — builder changes won't apply until you sync.</span>
                  <button className="glp-smallbtn" type="button" onClick={() => setOverride(null)}>
                    Sync from builder
                  </button>
                </div>
              )}
              <div className="glp-code__bar">
                <span className="glp-view__label">Raw HTML</span>
                <span className={"glp-chip" + (override !== null ? " glp-chip--warn" : "")}>
                  {override !== null ? "manual edits" : "generated from builder"}
                </span>
                <span className="glp-chip">{(exportHtml.length / 1024).toFixed(1)} KB</span>
              </div>
              <textarea spellCheck={false} value={exportHtml} onChange={(e) => setOverride(e.target.value)} />
            </div>
            <Preview html={exportHtml} mode={mode} setMode={setMode} device={device} setDevice={setDevice} />
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
